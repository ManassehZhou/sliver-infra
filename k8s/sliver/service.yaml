# Operator-facing service: multiplayer port only, cluster-internal.
# Operators connect via: kubectl -n red-team port-forward svc/sliver 31337:31337
apiVersion: v1
kind: Service
metadata:
  name: sliver
  namespace: red-team
  labels:
    app: sliver
    role: c2-server
spec:
  type: ClusterIP
  selector:
    app: sliver
  ports:
    - name: multiplayer
      port: 31337
      targetPort: 31337
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: sliver-c2
  namespace: red-team
  labels:
    app: sliver
    role: c2-server
  annotations:
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-name: "silver-c2"
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: "internet"
spec:
  type: LoadBalancer
  selector:
    app: sliver
    role: c2-server
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: sliver-tsh
  namespace: red-team
  labels:
    app: sliver
    role: c2-server
  annotations:
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-name: "silver-tsh"
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: "internet"
spec:
  type: LoadBalancer
  selector:
    app: sliver
    role: c2-server
  ports:
    - name: tsh
      port: 3389
      targetPort: 3389
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: internet
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-name: silver-dns
  labels:
    app: sliver
    role: c2-server
  name: sliver-dns
  namespace: red-team
spec:
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
  selector:
    app: sliver
    role: c2-server
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: internet
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-name: silver-mtls
  labels:
    app: sliver
    role: c2-server
  name: sliver-mtls
  namespace: red-team
spec:
  ports:
    - name: 
      port: 3306
      protocol: TCP
      targetPort: 3306
  selector:
    app: sliver
    role: c2-server
  type: LoadBalancer
